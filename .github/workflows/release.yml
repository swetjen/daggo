name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Release Test Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [ "${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "VERSION ${VERSION} does not match tag ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive: zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          EXT: ${{ matrix.ext }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          OUT_DIR="dist"
          VERSION="${VERSION:-dev}"
          BIN="daggo${EXT}"
          TARGET="daggo_${VERSION}_${GOOS}_${GOARCH}"

          mkdir -p "${OUT_DIR}/${TARGET}"
          CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" go build -trimpath -ldflags="-s -w" -o "${OUT_DIR}/${TARGET}/${BIN}" ./cmd/api

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd "${OUT_DIR}" && zip -r "${TARGET}.zip" "${TARGET}")
            rm -rf "${OUT_DIR:?}/${TARGET}"
          else
            tar -C "${OUT_DIR}" -czf "${OUT_DIR}/${TARGET}.tar.gz" "${TARGET}"
            rm -rf "${OUT_DIR:?}/${TARGET}"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daggo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Publish Release Assets
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: daggo-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
